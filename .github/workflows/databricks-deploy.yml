name: Job - Databricks Deploy via Key Vault (OIDC)
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      keyvault_name:
        required: true
        type: string
      secret_client_id_name:
        required: true
        type: string
      secret_client_secret_name:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get Secrets from Key Vault
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: ${{ inputs.keyvault_name }}
          secrets: '${{ inputs.secret_client_id_name }}, ${{ inputs.secret_client_secret_name }}'
        id: kv-secrets

      - name: Setup Databricks CLI
        uses: gonntt/devsecops---actions/.github/integrations/databricks@main

      - name: Databricks Bundle Deploy & Smoke Test Dinâmico com Rollback
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ steps.kv-secrets.outputs[inputs.secret_client_id_name] }}
          DATABRICKS_CLIENT_SECRET: ${{ steps.kv-secrets.outputs[inputs.secret_client_secret_name] }}
        run: |
          # 1. Executa o deploy do bundle
          echo "🚀 Iniciando deploy do asset bundle no Databricks..."
          databricks bundle deploy -t ${{ inputs.environment }}
          echo "✅ Deployment complete com sucesso!"
          
          echo "==========================================================="
          echo "🔍 Lendo configurações de governança do manifesto do dev..."
          echo "==========================================================="
          
          # Extrai os metadados e as flags customizadas do desenvolvedor
          BUNDLE_JSON=$(databricks bundle validate -t ${{ inputs.environment }} --output json)
          
          ENABLE_TEST=$(echo "$BUNDLE_JSON" | jq -r '.variables.enable_smoke_test // "true"')
          ENABLE_ROLLBACK=$(echo "$BUNDLE_JSON" | jq -r '.variables.enable_rollback // "false"')
          ROOT_PATH=$(echo "$BUNDLE_JSON" | jq -r '.target.workspace.root_path')
          RELATIVE_NOTEBOOK=$(echo "$BUNDLE_JSON" | jq -r '.variables.smoke_test_path')
          
          echo "⚙️ Executar Smoke Test? [ ${ENABLE_TEST} ]"
          echo "⚙️ Executar Rollback Automático em caso de falha? [ ${ENABLE_ROLLBACK} ]"
          
          # Se o desenvolvedor desligou o teste no manifesto, encerra a esteira com sucesso aqui
          if [ "$ENABLE_TEST" != "true" ]; then
             echo "ℹ️ Smoke Test desativado via manifesto pelo desenvolvedor. Finalizando pipeline com sucesso."
             exit 0
          fi
          
          echo "==========================================================="
          echo "🚀 Disparando Smoke Test condicional na pasta Shared..."
          echo "==========================================================="
          
          # Monta o caminho absoluto dinâmico limpando a extensão .py para a API de Jobs
          RELATIVE_NOTEBOOK_CLEAN=$(echo "$RELATIVE_NOTEBOOK" | sed 's|^\./||' | sed 's|\.py$||' | sed 's|\.ipynb$||')
          NOTEBOOK_TARGET="${ROOT_PATH}/files/${RELATIVE_NOTEBOOK_CLEAN}"
          
          REPO_NAME_LOWER=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          cat <<EOF > smoke_test_payload.json
          {
            "run_name": "smoke-test-${REPO_NAME_LOWER}",
            "tasks": [
              {
                "task_key": "smoke_test_notebook",
                "notebook_task": {
                  "notebook_path": "${NOTEBOOK_TARGET}"
                }
              }
            ]
          }
          EOF
          
          # Dispara o job em modo asgyn/no-wait
          databricks jobs submit --json @smoke_test_payload.json --no-wait --output json > run_response.json
          RUN_ID=$(jq -r '.run_id // empty' run_response.json)
          rm -f run_response.json
          
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "⚠️ Não foi possível capturar o ID de execução. O monitoramento foi pulado."
            rm -f smoke_test_payload.json
            exit 0
          fi
          
          echo "📍 Smoke Test iniciado no Databricks. Run ID: ${RUN_ID}"
          echo "⏳ Monitorando a execução do notebook diretamente..."
          
          # Loop de polling compatível com a CLI v0.299.1
          TIMEOUT_MINUTES=5
          MAX_ATTEMPTS=$((TIMEOUT_MINUTES * 6))
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RUN_INFO_JSON=$(databricks jobs get-run ${RUN_ID} --output json)
            LIFE_CYCLE=$(echo "$RUN_INFO_JSON" | jq -r '.state.life_cycle_state // empty')
            echo "🔄 Estado atual do Job: ${LIFE_CYCLE}"
            if [ "$LIFE_CYCLE" = "TERMINATED" ] || [ "$LIFE_CYCLE" = "SKIPPED" ] || [ "$LIFE_CYCLE" = "INTERNAL_ERROR" ]; then
               break
            fi
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          # Veredito final do teste
          RUN_INFO_FINAL=$(databricks jobs get-run ${RUN_ID} --output json)
          RUN_STATUS=$(echo "$RUN_INFO_FINAL" | jq -r '.state.result_state // empty')
          rm -f smoke_test_payload.json
          
          if [ "$RUN_STATUS" = "SUCCESS" ]; then
            echo "==========================================================="
            echo "🎉 SMOKE TEST EXECUTADO COM SUCESSO NO DATABRICKS!"
            echo "==========================================================="
            exit 0
          fi
          
          # -----------------------------------------------------------
          # TRATAMENTO DE FALHA DO TESTE
          # -----------------------------------------------------------
          echo "==========================================================="
          echo "❌ SMOKE TEST FALHOU NO AMBIENTE DO DATABRICKS!"
          echo "==========================================================="
          
          # Coleta e expõe o erro do Spark na tela
          TASK_RUN_ID=$(echo "$RUN_INFO_FINAL" | jq -r '.tasks[0].run_id // empty')
          if [ -n "$TASK_RUN_ID" ] && [ "$TASK_RUN_ID" != "null" ]; then
             databricks jobs get-run-output ${TASK_RUN_ID} --output json > output_response.json
             ERROR_MSG=$(jq -r '.notebook_output.error_summary // empty' output_response.json)
             rm -f output_response.json
             if [ -n "$ERROR_MSG" ] && [ "$ERROR_MSG" != "null" ]; then
                echo "📝 Detalhes do Erro do Spark coletados:"
                echo "-----------------------------------------------------------"
                echo "$ERROR_MSG"
                echo "-----------------------------------------------------------"
             fi
          fi
          
          # DECISÃO DO ROLLBACK AUTOMÁTICO
          if [ "$ENABLE_ROLLBACK" = "true" ]; then
             echo "🚨 CRÍTICO: Mecanismo de Rollback Automático ATIVADO pelo manifesto."
             echo "⚠️ Removendo os arquivos implantados para limpar o ambiente..."
             
             # Executa o destroy limpando a pasta que acabou de subir de forma forçada
             databricks bundle destroy -t ${{ inputs.environment }} --auto-approve
             
             echo "✅ Rollback executado! O ambiente foi restaurado/limpo."
             echo "❌ Quebrando a esteira para sinalizar falha no código."
             exit 1 # Deixa a esteira VERMELHA (Bloqueia o deploy)
          else
             echo "==========================================================="
             echo "⚠️ AVISO DE GOVERNANÇA: O deploy foi mantido no Databricks."
             echo "Mecanismo de Rollback desativado (enable_rollback: false)."
             echo "O desenvolvedor deve analisar o erro acima e aplicar a correção."
             echo "==========================================================="
             exit 0 # Mantém a esteira VERDE (Resiliente)
          fi