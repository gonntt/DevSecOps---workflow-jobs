name: Job - Databricks Deploy via Key Vault (OIDC)
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      keyvault_name:
        required: true
        type: string
      secret_client_id_name:
        required: true
        type: string
      secret_client_secret_name:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  
      - name: Get Secrets from Key Vault
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: ${{ inputs.keyvault_name }}
          secrets: '${{ inputs.secret_client_id_name }}, ${{ inputs.secret_client_secret_name }}'
        id: kv-secrets

      - name: Setup Databricks CLI
        uses: gonntt/devsecops---actions/.github/integrations/databricks@main

      - name: Databricks Bundle Deploy & Smoke Test
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ steps.kv-secrets.outputs[inputs.secret_client_id_name] }}
          DATABRICKS_CLIENT_SECRET: ${{ steps.kv-secrets.outputs[inputs.secret_client_secret_name] }}
        run: |
          # 1. Executa o deploy do bundle mapeado
          databricks bundle deploy -t ${{ inputs.environment }}
          
          echo "==========================================================="
          echo "🚀 Gerando payload e disparando Smoke Test isolado..."
          echo "==========================================================="
          
          # Cria o arquivo JSON contendo a estrutura exata que a API do Databricks v0.299.1 exige
          cat <<EOF > smoke_test_payload.json
          {
            "run_name": "smoke-test-${{ github.event.repository.name }}",
            "tasks": [
              {
                "task_key": "smoke_test_notebook",
                "notebook_task": {
                  "notebook_path": "/Shared/projetos/${{ github.event.repository.name }}/${{ inputs.environment }}/notebooks/teste.py"
                }
              }
            ]
          }
          EOF
          
          # Executa apontando para o arquivo JSON e monitora a execução até o final (--wait)
          databricks jobs submit --json @smoke_test_payload.json
          
          # Limpa o arquivo temporário do runner
          rm smoke_test_payload.json