name: Job - Databricks Deploy via Key Vault (OIDC)
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      keyvault_name:
        required: true
        type: string
      secret_client_id_name:
        required: true
        type: string
      secret_client_secret_name:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get Secrets from Key Vault
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: ${{ inputs.keyvault_name }}
          secrets: '${{ inputs.secret_client_id_name }}, ${{ inputs.secret_client_secret_name }}'
        id: kv-secrets

      - name: Setup Databricks CLI
        uses: gonntt/devsecops---actions/.github/integrations/databricks@main

      - name: Databricks Bundle Deploy & Smoke Test Resiliente
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ steps.kv-secrets.outputs[inputs.secret_client_id_name] }}
          DATABRICKS_CLIENT_SECRET: ${{ steps.kv-secrets.outputs[inputs.secret_client_secret_name] }}
        run: |
          # 1. Executa o deploy do bundle
          echo "🚀 Iniciando deploy do asset bundle no Databricks..."
          databricks bundle deploy -t ${{ inputs.environment }}
          echo "✅ Deployment complete com sucesso!"
          
          echo "==========================================================="
          echo "🚀 Disparando Smoke Test condicional na pasta Shared..."
          echo "==========================================================="
          
          REPO_NAME_LOWER=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          DEPLOY_PATH="/Shared/projetos/${REPO_NAME_LOWER}/${{ inputs.environment }}/files"
          NOTEBOOK_TARGET="${DEPLOY_PATH}/notebooks/teste"
          
          cat <<EOF > smoke_test_payload.json
          {
            "run_name": "smoke-test-${REPO_NAME_LOWER}",
            "tasks": [
              {
                "task_key": "smoke_test_notebook",
                "notebook_task": {
                  "notebook_path": "${NOTEBOOK_TARGET}"
                }
              }
            ]
          }
          EOF
          
          # 2. Dispara o job salvando a resposta direto em um arquivo físico
          databricks jobs submit --json @smoke_test_payload.json --no-wait --output json > run_response.json
          
          # Extrai o run_id
          RUN_ID=$(jq -r '.run_id // empty' run_response.json)
          rm -f run_response.json
          
          # Validação de ID
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "⚠️ Não foi possível capturar o ID de execução do Databricks."
            echo "O deploy foi concluído, mas o monitoramento do log foi pulado."
            rm -f smoke_test_payload.json
            exit 0
          fi
          
          echo "📍 Smoke Test iniciado no Databricks. Run ID: ${RUN_ID}"
          echo "⏳ Aguardando a execução do notebook finalizar..."
          
          # CORREÇÃO: Adicionado 'jobs' antes de 'runs wait'
          databricks jobs runs wait ${RUN_ID} --timeout 10m || true
          
          # CORREÇÃO: Adicionado 'jobs' antes de 'runs get'
          RUN_STATUS=$(databricks jobs runs get ${RUN_ID} --output json | jq -r '.state.result_state // empty')
          
          if [ "$RUN_STATUS" = "SUCCESS" ]; then
            echo "==========================================================="
            echo "🎉 SMOKE TEST EXECUTADO COM SUCESSO NO DATABRICKS!"
            echo "==========================================================="
          else
            echo "==========================================================="
            echo "❌ SMOKE TEST FALHOU! TRAZENDO OS LOGS DO SPARK..."
            echo "==========================================================="
            
            # CORREÇÃO: Adicionado 'jobs' antes de 'runs get-output'
            databricks jobs runs get-output ${RUN_ID} --output json > output_response.json
            
            ERROR_MSG=$(jq -r '.notebook_output.error_summary // empty' output_response.json)
            rm -f output_response.json
            
            if [ -z "$ERROR_MSG" ] || [ "$ERROR_MSG" = "null" ]; then
               # CORREÇÃO: Adicionado 'jobs' antes de 'runs get'
               echo "📝 Status do ciclo de vida: $(databricks jobs runs get ${RUN_ID} --output json | jq -r '.state.life_cycle_state')"
               echo "⚠️ O notebook falhou antes de iniciar a execução das células (erro de cluster ou permissão interna)."
            else
               echo "📝 Detalhes do Erro do Spark:"
               echo "$ERROR_MSG"
            fi
            
            echo "-----------------------------------------------------------"
            echo "⚠️  AVISO: O deploy foi feito, mas o código do notebook quebrou."
            echo "Verifique o log acima para corrigir a lógica do Python."
            echo "==========================================================="
          fi
          
          rm -f smoke_test_payload.json