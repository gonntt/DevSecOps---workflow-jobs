name: Job - Databricks Deploy via Key Vault (OIDC)
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      keyvault_name:
        required: true
        type: string
      secret_client_id_name:
        required: true
        type: string
      secret_client_secret_name:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  
      - name: Get Secrets from Key Vault
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: ${{ inputs.keyvault_name }}
          secrets: '${{ inputs.secret_client_id_name }}, ${{ inputs.secret_client_secret_name }}'
        id: kv-secrets

      - name: Setup Databricks CLI
        uses: gonntt/devsecops---actions/.github/integrations/databricks@main

      - name: Databricks Bundle Deploy & Smoke Test Resiliente
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ steps.kv-secrets.outputs[inputs.secret_client_id_name] }}
          DATABRICKS_CLIENT_SECRET: ${{ steps.kv-secrets.outputs[inputs.secret_client_secret_name] }}
        run: |
          # 1. Executa o deploy do bundle mapeado na pasta Shared
          echo "🚀 Iniciando deploy do asset bundle no Databricks..."
          databricks bundle deploy -t ${{ inputs.environment }}
          echo "✅ Deployment complete com sucesso!"
          
          echo "==========================================================="
          echo "🚀 Disparando Smoke Test condicional na pasta Shared..."
          echo "==========================================================="
          
          REPO_NAME_LOWER=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          DEPLOY_PATH="/Shared/projetos/${REPO_NAME_LOWER}/${{ inputs.environment }}"
          
          # 2. Cria o arquivo JSON do payload para a pasta Shared
          cat <<EOF > smoke_test_payload.json
          {
            "run_name": "smoke-test-${REPO_NAME_LOWER}",
            "tasks": [
              {
                "task_key": "smoke_test_notebook",
                "notebook_task": {
                  "notebook_path": "${DEPLOY_PATH}/notebooks/teste.py"
                }
              }
            ]
          }
          EOF
          
          # 3. Tenta rodar o teste salvando o resultado. O '|| true' impede o passo de quebrar a esteira imediatamente
          if databricks jobs submit --json @smoke_test_payload.json; then
            echo "==========================================================="
            echo "🎉 SMOKE TEST EXECUTADO COM SUCESSO!"
            echo "==========================================================="
          else
            echo "==========================================================="
            echo "⚠️  AVISO DE GOVERNANÇA / PERMISSÃO DETECTADO"
            echo "==========================================================="
            echo "O deploy foi concluído com sucesso, mas o Smoke Test não pôde rodar."
            echo "Motivo provável: O Service Principal 'databricks-github-actions-sp' não possui a permissão CAN_MANAGE na pasta '${DEPLOY_PATH}'."
            echo "Para habilitar o teste automático, adicione essa permissão para o SP no console do Databricks ou via bundle.yml."
            echo "==========================================================="
          fi
          
          # Limpa o payload técnico do runner
          rm -f smoke_test_payload.json