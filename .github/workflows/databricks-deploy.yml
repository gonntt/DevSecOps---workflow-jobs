name: Job - Databricks Deploy via Key Vault (OIDC)
on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    permissions:
      id-token: write # Necessário para o fluxo OIDC da imagem
      contents: read

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      # 1. Autenticação OIDC (Passo 1 a 3 da imagem)
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # 2. Busca de Segredos no Key Vault (Passo 4 e 5 da imagem)
      # Esta action substitui o plugin do CoE e funciona nativamente com OIDC
      - name: Get Secrets from Key Vault
        uses: Azure/get-keyvault-secrets@v1
        with:
          keyvault: "kv-dataops-${{ inputs.environment }}"
          # Aqui você lista os nomes das chaves como estão no Key Vault
          secrets: 'databricks-sp-client-id, databricks-sp-client-secret'
        id: kv-secrets

      - name: Setup Databricks CLI
        uses: caixagithub/DevSecOps-Actions/.github/integrations/databricks/
        with:
          cli_version: '0.219.0'

      # 3. Deploy (Usando os segredos buscados em memória)
      - name: Executar Databricks Bundle Deploy
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          # Os valores vêm da saída do step 'kv-secrets'
          DATABRICKS_CLIENT_ID: ${{ steps.kv-secrets.outputs.databricks-sp-client-id }}
          DATABRICKS_CLIENT_SECRET: ${{ steps.kv-secrets.outputs.databricks-sp-client-secret }}
        run: |
          databricks bundle deploy -t ${{ inputs.environment }}