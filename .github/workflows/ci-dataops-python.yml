name: Job - Python CI
on:
  workflow_call:

jobs:
  validate-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar ferramentas de CI e dependências do projeto
        run: |
          python -m pip install --upgrade pip
          # Instala as ferramentas necessárias para rodar os testes e lintings
          pip install ruff mypy pytest pytest-cov
          
          # Se o projeto tiver alguma dependência extra futuramente, ela será instalada aqui
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Ruff Check (Linting)
        run: |
          if [ -d "src" ]; then
            echo "Pasta src/ encontrada. Executando Ruff padrão..."
            ruff check src/
          elif [ -d "notebooks" ]; then
            echo "Pasta notebooks/ encontrada. Ignorando variáveis nativas do Databricks..."
            # Força o Ruff a ignorar o erro F821 (Undefined name) apenas nos notebooks do Databricks
            ruff check notebooks/ --ignore F821
          else
            echo "⚠️ Nenhuma pasta de código (src/ ou notebooks/) encontrada. Pulando Linting."
          fi

      - name: Mypy (Type Checking)
        run: |
          if [ -d "src" ]; then
            echo "Pasta src/ encontrada. Executando Mypy..."
            mypy src/ --ignore-missing-imports
          elif [ -d "notebooks" ]; then
            echo "Pasta notebooks/ encontrada. Executando Mypy..."
            mypy notebooks/ --ignore-missing-imports
          else
            echo "⚠️ Nenhuma pasta de código encontrada. Pulando Type Checking."
          fi

      - name: Pytest com Coverage
        run: |
          if [ -d "tests" ]; then
            echo "Pasta tests/ encontrada. Executando testes unitários..."
            coverage run -m pytest tests/
            coverage report --fail-under=80
          else
            echo "⚠️ Pasta tests/ não encontrada neste repositório. Pulando testes."
          fi