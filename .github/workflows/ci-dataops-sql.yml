name: Job - SQL CI
on:
  workflow_call:

jobs:
  validate-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar SQLFluff
        # Fixando a versão identificada nos vossos requirements
        run: pip install sqlfluff==2.3.*

      - name: Validar código SQL
        run: |
          # Procura se existe pelo menos um arquivo .sql no repositório
          if [ -n "$(find . -name '*.sql' -print -quit)" ]; then
            echo "Arquivos SQL encontrados. Executando validação..."
            
            sqlfluff lint .
            
          else
            echo "Nenhum arquivo SQL encontrado neste projeto. Validação ignorada com sucesso."
          fi